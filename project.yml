name: PlantNFC
options:
  bundleIdPrefix: com.plantnfc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.2"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    ENABLE_BITCODE: NO

targets:
  PlantNFC:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PlantNFC
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plantnfc.app
        INFOPLIST_FILE: PlantNFC/Info.plist
        CODE_SIGN_ENTITLEMENTS: PlantNFC/PlantNFC.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        SWIFT_VERSION: "5.9"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "iPhone Developer"
          CODE_SIGNING_REQUIRED: YES
          CODE_SIGNING_ALLOWED: YES
        Release:
          CODE_SIGN_IDENTITY: "iPhone Distribution"
    entitlements:
      path: PlantNFC/PlantNFC.entitlements
      properties:
        com.apple.developer.nfc.readersession.formats:
          - TAG
        com.apple.security.application-groups:
          - group.com.plantnfc
    info:
      path: PlantNFC/Info.plist
      properties:
        CFBundleName: PlantNFC
        CFBundleDisplayName: PlantNFC
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIUserInterfaceStyle: Automatic
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
        NFCReaderUsageDescription: "PlantNFC leest NFC-tags om uw planten te identificeren."
        BGTaskSchedulerPermittedIdentifiers:
          - com.plantnfc.refresh
        UIBackgroundModes:
          - fetch
          - processing
    dependencies:
      []
